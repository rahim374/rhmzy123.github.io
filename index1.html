<!DOCTYPE html>
<html>
<head>
  <title>Student's Complain Form</title>
  <style>
    body {
      background-color: pink;   
      font-family: Arial, sans-serif;
      color: black;
      margin: 0;
      padding: 40px 0;
    }
      
    #bg-video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;        
      height: 100%;       
      z-index: -2;       
      object-fit: cover;
    }
    
    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;        
      height: 100%;       
      background: rgba(0, 0, 0, 0.3);
      z-index: -1;
    }
    
    .form-container {
      width: 500px;
      margin: auto;
      padding: 20px;
      background: rgba(255, 192, 203, 0.95); /* Nimeongeza uwazi */
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
      position: relative;  /* IMEONGEZWA - MUHIMU */
      z-index: 1;          /* IMEONGEZWA - MUHIMU */
    }
    .form-container h2 {
      text-align: center;
      margin-bottom: 20px;
      color: red;               
    }
    table {
      width: 100%;
      border-collapse: collapse;
      border: 2px solid black;  
    }
    td {
      padding: 8px;
      vertical-align: top;
      border: 1px solid black;  
      background: rgba(255, 192, 203, 0.8); /* Nimeongeza */
    }
    .form-container input[type="text"],
    .form-container input[type="password"],
    .form-container select {
      width: 100%;
      padding: 6px;
      border: 1px solid #ccc;
      border-radius: 4px;
      box-sizing: border-box;
    }
    .form-container input[type="file"] {
      width: 100%;
    }
    .submit-container {
      text-align: center;       
      margin-top: 15px;
    }
    .form-container button {
      padding: 6px 20px;        
      background-color: white; 
      color: black;             
      border: 1px solid black;  
      border-radius: 4px;
      cursor: pointer;
      font-weight: normal;      
    }
    .form-container button:hover {
      background-color: #f0f0f0;
    }
    .footer {
      text-align: center;
      margin-top: 15px;
    }
    .portrait {
      text-align: right;
      margin-bottom: 15px; 
    }
    .portrait img {
      width: 80px;
      height: 100px;
      border-radius: 4px;
      border: 2px solid black; 
    }
  </style>
</head>
<body>

<video autoplay muted loop playsinline id="bg-video">
  <source src="LiveMessage_2026-06-22-09-49-22.mp4">  
</video>  


<div class="overlay"></div>

  <div class="form-container">
    <div class="portrait">
      <img src="02_1611_21_03_2025.jpg" alt="Rahim Rashid">
    </div>
    <h2>Student's Complain Form</h2>
    <form>
      <table>
        <tr>
          <td><label for="name">Student name:</label></td>
          <td><input type="text" id="name" name="name"></td>
        </tr>
        <tr>
          <td><label>Gender:</label></td>
          <td>
            <input type="radio" id="male" name="gender" value="Male">
            <label for="male">Male</label>
            <input type="radio" id="female" name="gender" value="Female">
            <label for="female">Female</label>
          </td>
        </tr>
        <tr>
          <td><label for="password">Password:</label></td>
          <td><input type="password" id="password" name="password"></td>
        </tr>
        <tr>
          <td><label for="complain">Upload Complain:</label></td>
          <td><input type="file" id="complain" name="complain"></td>
        </tr>
        <tr>
          <td><label for="type">Select type of complain:</label></td>
          <td>
            <select id="type" name="type">
              <option value="results">Results</option>
              <option value="discipline">Discipline</option>
              <option value="facilities">Facilities</option>
            </select>
          </td>
        </tr>
      </table>
      <div class="submit-container">
        <button type="submit">Submit the complain</button>
      </div>
    </form>
    <div class="footer">
      RAHIM RASHID TRESPHORY<br>
      02.1611.21.03.2025
    </div>
  </div>
</body>
</html>
